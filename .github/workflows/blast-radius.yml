name: Blast Radius Analysis

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  analyze-changes:
    name: Analyze PR Impact
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install GitNexus
        run: npm install -g gitnexus
      
      - name: Check GitNexus index
        id: check-index
        run: |
          cd ${{ github.workspace }}
          npx gitnexus status || echo "index_exists=false" >> $GITHUB_OUTPUT
      
      - name: Analyze codebase
        if: steps.check-index.outputs.index_exists == 'false'
        run: |
          cd ${{ github.workspace }}
          npx gitnexus analyze
      
      - name: Detect changes
        id: detect-changes
        run: |
          cd ${{ github.workspace }}
          OUTPUT=$(npx gitnexus detect-changes --scope compare --base-ref origin/${{ github.base_ref }} --format json)
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Analyze hotspot impact
        id: hotspot-check
        run: |
          cd ${{ github.workspace }}
          
          # Critical hotspots (from blast radius analysis)
          HOTSPOTS=(
            "cleanup:core/text_cleanup.py"
            "add:services/history.py"
            "request:api/client.ts"
            "create_job:services/batch.py"
            "ModelWrapper:core/models.py"
          )
          
          CRITICAL_TOUCHED=false
          TOUCHED_LIST=""
          
          for hotspot in "${HOTSPOTS[@]}"; do
            SYMBOL="${hotspot%%:*}"
            FILE="${hotspot##*:}"
            
            if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "$FILE"; then
              CRITICAL_TOUCHED=true
              TOUCHED_LIST="${TOUCHED_LIST}\n- ${SYMBOL} (${FILE})"
            fi
          done
          
          echo "critical_touched=$CRITICAL_TOUCHED" >> $GITHUB_OUTPUT
          echo "touched_list<<EOF" >> $GITHUB_OUTPUT
          echo -e "$TOUCHED_LIST" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Comment PR with blast radius
        uses: actions/github-script@v7
        with:
          script: |
            const criticalTouched = '${{ steps.hotspot-check.outputs.critical_touched }}' === 'true';
            const touchedList = `${{ steps.hotspot-check.outputs.touched_list }}`;
            
            let body = '## 🎯 Blast Radius Analysis\n\n';
            
            if (criticalTouched) {
              body += '⚠️ **WARNING: This PR touches CRITICAL hotspots!**\n\n';
              body += '### Critical Hotspots Modified\n';
              body += touchedList || 'See changed files below';
              body += '\n\n';
              body += '**Impact**: Changes to these symbols affect 15+ callers each.\n';
              body += '**Required Actions**:\n';
              body += '- [ ] Run full test suite\n';
              body += '- [ ] Manual QA of affected flows\n';
              body += '- [ ] Review all callers of modified hotspots\n';
              body += '- [ ] Consider breaking changes into smaller PRs\n\n';
            } else {
              body += '✅ **No critical hotspots modified**\n\n';
              body += 'This PR does not touch high-impact symbols.\n\n';
            }
            
            body += '### Test Recommendations\n';
            body += '- Run hotspot tests: `pytest tests/test_hotspot_*.py`\n';
            body += '- Run integration tests: `pytest tests/ -m integration`\n';
            body += '- Check GitNexus impact: `npx gitnexus detect-changes`\n\n';
            body += '---\n';
            body += '_Generated by Blast Radius Analysis workflow_';
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Blast Radius Analysis')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
      
      - name: Set PR label
        if: steps.hotspot-check.outputs.critical_touched == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['⚠️ hotspot-impact']
            });
